<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor de Turnos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#eef5f7;
    font-family: 'Segoe UI', sans-serif;
}

.sidebar{
    width:280px;
    height:100vh;
    background:white;
    position:fixed;
    left:0;
    top:0;
    border-right:1px solid #e5e5e5;
}

.logo{
    padding:25px;
    font-size:28px;
    font-weight:bold;
    color:#1f2937;
}

.menu a{
    display:block;
    padding:15px 25px;
    text-decoration:none;
    color:#444;
    transition:.3s;
}

.menu a:hover{
    background:#dff6fb;
    color:#0097b2;
}

.main{
    margin-left:280px;
    padding:20px;
}

.topbar{
    background:white;
    border-radius:15px;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.card-custom{
    background:white;
    border:none;
    border-radius:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.calendar-container{
    height:800px;
}

.form-control,
.form-select{
    border-radius:10px;
}

.btn-primary{
    border-radius:10px;
    background:#0d6efd;
}

.patient-item{
    padding:10px;
    border-bottom:1px solid #eee;
}

.patient-item:hover{
    background:#f8f9fa;
}

</style>
</head>
<body>

<!-- SIDEBAR -->

<div class="sidebar">

    <div class="logo">
        Apex Movement
    </div>

    <div class="menu">

        <a href="#">🏠 Dashboard</a>
        <a href="#">📅 Turnos</a>
        <a href="#">👨‍⚕️ Pacientes</a>
        <a href="#">🩺 Servicios</a>
        <a href="#">👥 Personal</a>
        <a href="#">📊 Reportes</a>
        <a href="#">⚙️ Configuración</a>

    </div>

</div>

<!-- MAIN -->

<div class="main">

    <!-- TOPBAR -->

    <div class="topbar">

        <h3 class="m-0">
            Próximos Turnos
        </h3>

        <div>
            Admin Sarah L
        </div>

    </div>

    <div class="row">

        <!-- GOOGLE CALENDAR -->

        <div class="col-lg-8">

            <div class="card card-custom p-3">

                <h4 class="mb-3">
                    Calendario de Turnos
                </h4>

                <div class="calendar-container">

                    <iframe
                        src="https://calendar.google.com/calendar/embed?src=es.ar%23holiday%40group.v.calendar.google.com&ctz=America%2FArgentina%2FBuenos_Aires"
                        style="border:0"
                        width="100%"
                        height="100%"
                        frameborder="0"
                        scrolling="no">
                    </iframe>

                </div>

            </div>

        </div>

        <!-- PANEL DERECHO -->

        <div class="col-lg-4">

            <!-- NUEVO TURNO -->

            <div class="card card-custom p-4 mb-4">

                <h5>Agendar Nuevo Turno</h5>

                <div class="mb-3">
                    <label>Servicio</label>
                    <select class="form-select">
                        <option>Fisioterapia</option>
                        <option>Kinesiología</option>
                        <option>Masajes</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label>Paciente</label>
                    <input type="text" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Profesional</label>
                    <select class="form-select">
                        <option>Dr. Emily Chen</option>
                        <option>Dr. Juan Perez</option>
                    </select>
                </div>

                <div class="row">

                    <div class="col">
                        <label>Fecha</label>
                        <input type="date" class="form-control">
                    </div>

                    <div class="col">
                        <label>Hora</label>
                        <input type="time" class="form-control">
                    </div>

                </div>

                <button class="btn btn-primary w-100 mt-4">
                    Confirmar Turno
                </button>

            </div>

            <!-- PACIENTES -->

            <div class="card card-custom p-4">

                <h5>Pacientes Recientes</h5>

                <input
                    class="form-control mb-3"
                    placeholder="Buscar paciente">

                <div class="patient-item">
                    Jane Smith
                </div>

                <div class="patient-item">
                    Mark Lee
                </div>

                <div class="patient-item">
                    Sarah Jones
                </div>

                <div class="patient-item">
                    Michael Brown
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
